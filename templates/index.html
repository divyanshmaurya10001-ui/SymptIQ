<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SymptIQ - AI Disease Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 500px;
            text-align: center;
        }
        h1 {
            color: #2c7be5;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 2px solid #2c7be5;
            border-radius: 8px;
            font-size: 16px;
            resize: none;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #2c7be5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1a5bbf;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 SymptIQ</h1>
        <p>AI Powered Disease Predictor</p>
        <form action="/predict" method="POST">
            <textarea name="symptoms" 
            placeholder="Enter your symptoms here...
Example: fever, headache, body pain"></textarea>
            <button type="submit">Predict Disease 🔍</button>
        </form>
    </div>
</body>
</html>
