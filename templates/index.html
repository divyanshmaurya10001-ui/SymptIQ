<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SymptIQ - AI Disease Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 500px;
        }
        h1 {
            color: #2c7be5;
            text-align: center;
        }
        p {
            text-align: center;
            color: #666;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            font-weight: bold;
            color: #333;
        }
        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 2px solid #2c7be5;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: #2c7be5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1a5bbf;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 SymptIQ</h1>
        <p>AI Powered Disease Predictor</p>

        <form action="/predict" method="POST">
            <div class="form-group">
                <label>Do you have Fever?</label>
                <select name="fever">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Do you have Cough?</label>
                <select name="cough">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Do you have Fatigue?</label>
                <select name="fatigue">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Difficulty Breathing?</label>
                <select name="breathing">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" placeholder="Enter your age" min="1" max="100">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Blood Pressure</label>
                <select name="bp">
                    <option value="1">Normal</option>
                    <option value="2">High</option>
                    <option value="0">Low</option>
                </select>
            </div>

            <div class="form-group">
                <label>Cholesterol Level</label>
                <select name="cholesterol">
                    <option value="1">Normal</option>
                    <option value="2">High</option>
                    <option value="0">Low</option>
                </select>
            </div>

            <button type="submit">Predict Disease 🔍</button>
        </form>
    </div>
</body>
</html>
