<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SymptIQ - Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 500px;
            text-align: center;
        }
        h1 {
            color: #2c7be5;
        }
        .disease {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            color: #2e7d32;
            font-size: 24px;
            font-weight: bold;
        }
        .warning {
            background: #fff3e0;
            padding: 15px;
            border-radius: 8px;
            color: #e65100;
            font-size: 14px;
            margin: 10px 0;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background: #2c7be5;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 SymptIQ Results</h1>
        <p>Based on your symptoms, you may have:</p>
        <div class="disease">
            🔍 {{ disease }}
        </div>
        <div class="warning">
            ⚠️ This is an AI prediction only. 
            Please consult a real doctor for proper diagnosis.
        </div>
        <a href="/">Check Again</a>
    </div>
</body>
</html>
